# GoReleaser v2 - cross-compile + archive + checksum + GitHub Release + Homebrew tap in one run.
# Cutting a release: land the change, update CHANGELOG.md, then `git tag vX.Y.Z && git push --tags`.
# The release.yml workflow does the rest. See docs/standards/go.md "Release engineering".
version: 2

project_name: ccpool

before:
  hooks:
    - go mod tidy

builds:
  - id: ccpool
    main: .
    binary: ccpool
    env:
      - CGO_ENABLED=0 # static binary, trivial cross-compile (the whole reason we chose Go)
    flags:
      - -trimpath
    ldflags:
      # Inject build metadata into main.{version,commit,date} (see main.go).
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    # mod_timestamp keeps builds reproducible (binary mtime = commit time, not build time).
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Sign + notarize the macOS binaries with Apple's OWN codesign + notarytool (see the script).
    # GoReleaser's built-in `notarize.macos` signs with quill, whose Developer ID signatures AMFI
    # rejects fatally at exec on some macOS builds ("Broken signature with Team ID fatal" -> SIGKILL
    # before main; v0.1.1 shipped exactly that). The script runs per built binary; it no-ops off
    # darwin and, when no identity is set (forks/local), leaves Go's ad-hoc signature. The release
    # runner is `macos-latest` so real codesign is available. See docs/DECISIONS.md.
    hooks:
      post:
        - cmd: ./scripts/macos-sign.sh "{{ .Path }}" "{{ .Os }}" "{{ .Arch }}"

archives:
  - id: ccpool
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  # Release notes from commit history, conventional-commit aware. The scope-tolerant "(\(.+\))?"
  # in each regex is load-bearing: a bare "^docs:" never matches a scoped "docs(readme):", so
  # every doc/chore/ci commit was leaking into the notes, and their @latest / @20 tokens rendered
  # as phantom "contributors" on the release. Match the scope too and the noise (and the phantoms)
  # disappear.
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*feat(\(.+\))?:'
      order: 0
    - title: Bug fixes
      regexp: '^.*fix(\(.+\))?:'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^style(\(.+\))?:'
      - "Merge pull request"
      - "Merge branch"

# Two channels in one tap. The binaries are signed + notarized (see the build `hooks.post` above),
# so neither cask needs the old quarantine-strip hook: AMFI accepts the signature and Gatekeeper
# accepts the notarization on first run. Installing both conflicts
# (both symlink a `ccpool` binary) -- pick one channel, as usual.
homebrew_casks:
  # Stable channel: `brew install SeanLF/tap/ccpool` -- stable tags only.
  - name: ccpool
    # Don't push the cask for prerelease/snapshot tags: `prerelease: auto` flags the GitHub Release,
    # but that flag does NOT gate the cask, so without this an rc tag would land in the stable tap
    # and `brew upgrade` would serve it as if it were stable.
    skip_upload: "auto"
    binaries: [ccpool]
    homepage: "https://github.com/SeanLF/ccpool"
    description: "Get the most out of a fixed Claude subscription pool"
    license: MIT
    repository:
      owner: SeanLF
      name: homebrew-tap
      branch: main
      # A PAT with repo scope on the tap; the default GITHUB_TOKEN can't push cross-repo.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
  # Bleeding-edge channel: `brew install SeanLF/tap/ccpool-beta` -- every tag, rc AND stable, so
  # dogfooders/friends always get the newest build and are never stranded on an old rc.
  - name: ccpool-beta
    skip_upload: false
    binaries: [ccpool]
    homepage: "https://github.com/SeanLF/ccpool"
    description: "Get the most out of a fixed Claude subscription pool (bleeding-edge channel)"
    license: MIT
    repository:
      owner: SeanLF
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

release:
  # Draft off; GoReleaser publishes the Release directly when the tag is pushed.
  prerelease: auto # tags like v1.0.0-rc.1 land as pre-releases automatically
