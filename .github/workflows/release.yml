name: Release

# Tag-push -> GoReleaser cross-compiles, uploads a GitHub Release (binaries + checksums), and
# publishes the Homebrew cask to SeanLF/homebrew-tap. See .goreleaser.yaml and docs/standards/go.md.
#
# One-time setup before the first release:
#   1. Create the public repo SeanLF/homebrew-tap.
#   2. Create a PAT with `repo` scope on that tap and add it here as the HOMEBREW_TAP_TOKEN secret.
# Then: `git tag vX.Y.Z && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog generator sees prior tags
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=homebrew   # beta ships binaries only; add the tap + HOMEBREW_TAP_TOKEN, then drop this flag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
