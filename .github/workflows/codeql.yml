name: CodeQL

# Static security analysis for a public repo. Cheap insurance. (govulncheck in go.yml covers
# dependency CVEs; CodeQL covers our own code.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 8 * *" # monthly

permissions:
  contents: read
  security-events: write # upload results to the Security tab

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/analyze@v3
